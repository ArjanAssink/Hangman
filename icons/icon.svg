<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5BC8F5"/>
      <stop offset="100%" stop-color="#A8E6CF"/>
    </linearGradient>
    <radialGradient id="rg-red" cx="35%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#FF9999"/>
      <stop offset="100%" stop-color="#E82222"/>
    </radialGradient>
    <radialGradient id="rg-yel" cx="35%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#FFF099"/>
      <stop offset="100%" stop-color="#F5B800"/>
    </radialGradient>
    <radialGradient id="rg-grn" cx="35%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#AAFFC2"/>
      <stop offset="100%" stop-color="#1DB954"/>
    </radialGradient>
    <radialGradient id="rg-blu" cx="35%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#A0C8FF"/>
      <stop offset="100%" stop-color="#2255EE"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#sky)"/>

  <!-- Clouds -->
  <ellipse cx="90"  cy="90"  rx="70" ry="28" fill="white" opacity="0.45"/>
  <ellipse cx="130" cy="78"  rx="50" ry="28" fill="white" opacity="0.45"/>
  <ellipse cx="420" cy="120" rx="65" ry="26" fill="white" opacity="0.40"/>
  <ellipse cx="460" cy="112" rx="42" ry="24" fill="white" opacity="0.40"/>

  <!-- Stars / sparkles -->
  <text x="68"  y="188" font-size="30" fill="#FFD700" opacity="0.8">✦</text>
  <text x="418" y="210" font-size="24" fill="#FFD700" opacity="0.8">✦</text>
  <text x="370" y="60"  font-size="18" fill="#FFFFFF"  opacity="0.7">✦</text>

  <!-- Blue balloon (far left, smaller) -->
  <g filter="url(#shadow)">
    <ellipse cx="118" cy="255" rx="68" ry="82" fill="url(#rg-blu)"/>
    <ellipse cx="100" cy="232" rx="16" ry="20" fill="rgba(255,255,255,0.32)"/>
    <polygon points="118,337 111,352 125,352" fill="#2255EE"/>
    <line x1="118" y1="352" x2="256" y2="418" stroke="#666" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Yellow balloon (left) -->
  <g filter="url(#shadow)">
    <ellipse cx="185" cy="210" rx="74" ry="90" fill="url(#rg-yel)"/>
    <ellipse cx="165" cy="184" rx="18" ry="22" fill="rgba(255,255,255,0.32)"/>
    <polygon points="185,300 178,316 192,316" fill="#F5B800"/>
    <line x1="185" y1="316" x2="256" y2="418" stroke="#666" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Green balloon (right) -->
  <g filter="url(#shadow)">
    <ellipse cx="327" cy="210" rx="74" ry="90" fill="url(#rg-grn)"/>
    <ellipse cx="307" cy="184" rx="18" ry="22" fill="rgba(255,255,255,0.32)"/>
    <polygon points="327,300 320,316 334,316" fill="#1DB954"/>
    <line x1="327" y1="316" x2="256" y2="418" stroke="#666" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Red balloon (center, largest) -->
  <g filter="url(#shadow)">
    <ellipse cx="256" cy="195" rx="95" ry="115" fill="url(#rg-red)"/>
    <ellipse cx="229" cy="162" rx="22" ry="28" fill="rgba(255,255,255,0.35)"/>
    <polygon points="256,310 248,328 264,328" fill="#E82222"/>
    <line x1="256" y1="328" x2="256" y2="418" stroke="#666" stroke-width="3" stroke-linecap="round"/>
    <!-- Question mark inside -->
    <text x="256" y="222" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial, sans-serif"
          font-size="100" font-weight="bold" fill="rgba(255,255,255,0.85)">?</text>
  </g>

  <!-- Knot where strings meet -->
  <circle cx="256" cy="418" r="9" fill="#555"/>

  <!-- Ribbon bow -->
  <ellipse cx="238" cy="436" rx="16" ry="9" fill="#FF6FC8" transform="rotate(-30 238 436)"/>
  <ellipse cx="274" cy="436" rx="16" ry="9" fill="#FF6FC8" transform="rotate(30 274 436)"/>
  <circle  cx="256" cy="430" r="8" fill="#FF6FC8"/>

  <!-- Bottom grass strip -->
  <ellipse cx="256" cy="510" rx="240" ry="30" fill="#7BC67E" opacity="0.4"/>
</svg>
