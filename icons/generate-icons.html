<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Generate PWA Icons</title>
<style>
  body { font-family: Arial, sans-serif; background: #f0f0f0; display: flex; flex-direction: column; align-items: center; padding: 40px; gap: 24px; }
  h2 { color: #333; }
  .previews { display: flex; gap: 32px; align-items: flex-end; flex-wrap: wrap; justify-content: center; }
  .preview-box { text-align: center; }
  canvas { border-radius: 22%; box-shadow: 0 4px 20px #0003; display: block; margin: 0 auto 8px; }
  button { padding: 12px 28px; font-size: 16px; background: #E82222; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
  button:hover { background: #c01818; }
  .note { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 16px 24px; max-width: 560px; color: #555; font-size: 14px; line-height: 1.6; }
  code { background: #eee; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
</style>
</head>
<body>
<h2>🎈 PWA Icon Generator — Woord Raden!</h2>

<div class="note">
  <strong>Instructions:</strong><br>
  1. Click each download button below.<br>
  2. Save <code>icon-192.png</code> and <code>icon-512.png</code> into the <code>icons/</code> folder.<br>
  3. You can delete this file afterwards.<br>
  4. Commit &amp; push the new files.
</div>

<div class="previews">
  <div class="preview-box">
    <canvas id="c192" width="192" height="192"></canvas>
    <p>192 × 192 px</p>
    <button onclick="download('c192','icon-192.png')">⬇ Download icon-192.png</button>
  </div>
  <div class="preview-box">
    <canvas id="c512" width="512" height="512"></canvas>
    <p>512 × 512 px</p>
    <button onclick="download('c512','icon-512.png')">⬇ Download icon-512.png</button>
  </div>
</div>

<script>
const SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5BC8F5"/>
      <stop offset="100%" stop-color="#A8E6CF"/>
    </linearGradient>
    <radialGradient id="rg-red" cx="35%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#FF9999"/>
      <stop offset="100%" stop-color="#E82222"/>
    </radialGradient>
    <radialGradient id="rg-yel" cx="35%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#FFF099"/>
      <stop offset="100%" stop-color="#F5B800"/>
    </radialGradient>
    <radialGradient id="rg-grn" cx="35%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#AAFFC2"/>
      <stop offset="100%" stop-color="#1DB954"/>
    </radialGradient>
    <radialGradient id="rg-blu" cx="35%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#A0C8FF"/>
      <stop offset="100%" stop-color="#2255EE"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000033"/>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#sky)"/>
  <ellipse cx="90"  cy="90"  rx="70" ry="28" fill="white" opacity="0.45"/>
  <ellipse cx="130" cy="78"  rx="50" ry="28" fill="white" opacity="0.45"/>
  <ellipse cx="420" cy="120" rx="65" ry="26" fill="white" opacity="0.40"/>
  <ellipse cx="460" cy="112" rx="42" ry="24" fill="white" opacity="0.40"/>
  <text x="68"  y="188" font-size="30" fill="#FFD700" opacity="0.8">✦</text>
  <text x="418" y="210" font-size="24" fill="#FFD700" opacity="0.8">✦</text>
  <text x="370" y="60"  font-size="18" fill="#FFFFFF"  opacity="0.7">✦</text>
  <g filter="url(#shadow)">
    <ellipse cx="118" cy="255" rx="68" ry="82" fill="url(#rg-blu)"/>
    <ellipse cx="100" cy="232" rx="16" ry="20" fill="rgba(255,255,255,0.32)"/>
    <polygon points="118,337 111,352 125,352" fill="#2255EE"/>
    <line x1="118" y1="352" x2="256" y2="418" stroke="#666" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g filter="url(#shadow)">
    <ellipse cx="185" cy="210" rx="74" ry="90" fill="url(#rg-yel)"/>
    <ellipse cx="165" cy="184" rx="18" ry="22" fill="rgba(255,255,255,0.32)"/>
    <polygon points="185,300 178,316 192,316" fill="#F5B800"/>
    <line x1="185" y1="316" x2="256" y2="418" stroke="#666" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g filter="url(#shadow)">
    <ellipse cx="327" cy="210" rx="74" ry="90" fill="url(#rg-grn)"/>
    <ellipse cx="307" cy="184" rx="18" ry="22" fill="rgba(255,255,255,0.32)"/>
    <polygon points="327,300 320,316 334,316" fill="#1DB954"/>
    <line x1="327" y1="316" x2="256" y2="418" stroke="#666" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g filter="url(#shadow)">
    <ellipse cx="256" cy="195" rx="95" ry="115" fill="url(#rg-red)"/>
    <ellipse cx="229" cy="162" rx="22" ry="28" fill="rgba(255,255,255,0.35)"/>
    <polygon points="256,310 248,328 264,328" fill="#E82222"/>
    <line x1="256" y1="328" x2="256" y2="418" stroke="#666" stroke-width="3" stroke-linecap="round"/>
    <text x="256" y="222" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="100" font-weight="bold" fill="rgba(255,255,255,0.85)">?</text>
  </g>
  <circle cx="256" cy="418" r="9" fill="#555"/>
  <ellipse cx="238" cy="436" rx="16" ry="9" fill="#FF6FC8" transform="rotate(-30 238 436)"/>
  <ellipse cx="274" cy="436" rx="16" ry="9" fill="#FF6FC8" transform="rotate(30 274 436)"/>
  <circle  cx="256" cy="430" r="8" fill="#FF6FC8"/>
  <ellipse cx="256" cy="510" rx="240" ry="30" fill="#7BC67E" opacity="0.4"/>
</svg>`;

function renderToCanvas(canvasId) {
  return new Promise(resolve => {
    const canvas = document.getElementById(canvasId);
    const ctx    = canvas.getContext('2d');
    const size   = canvas.width;
    const blob   = new Blob([SVG], { type: 'image/svg+xml' });
    const url    = URL.createObjectURL(blob);
    const img    = new Image();
    img.onload = () => {
      ctx.clearRect(0, 0, size, size);
      ctx.drawImage(img, 0, 0, size, size);
      URL.revokeObjectURL(url);
      resolve();
    };
    img.src = url;
  });
}

function download(canvasId, filename) {
  const canvas = document.getElementById(canvasId);
  const a = document.createElement('a');
  a.download = filename;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

// Auto-render both canvases on load
Promise.all([renderToCanvas('c192'), renderToCanvas('c512')]);
</script>
</body>
</html>
